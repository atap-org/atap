server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve markdown when Accept: text/markdown
    # Falls back to normal HTML if .md file doesn't exist
    location / {
        if ($http_accept ~* "text/markdown") {
            rewrite ^/$ /index.md break;
            rewrite ^(/.*)/$ $1/index.md break;
            rewrite ^(/.+?)(?:\.html)?$ $1.md break;
        }

        try_files $uri $uri.html $uri/index.html =404;
    }

    # Set correct content type for .md files
    location ~* \.md$ {
        types { }
        default_type text/markdown;
        add_header Content-Type "text/markdown; charset=utf-8" always;
    }
}
