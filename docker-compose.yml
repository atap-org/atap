version: "3.9"

services:
  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://atap:atap@postgres:5432/atap?sslmode=disable
      REDIS_URL: redis://redis:6379
      PLATFORM_DOMAIN: localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./platform:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atap
      POSTGRES_PASSWORD: atap
      POSTGRES_DB: atap
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
